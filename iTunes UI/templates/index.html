<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes BI Dashboard</title>
    <style>
    :root {
        --primary: #fa243c;
        --accent: #00d4ff;
        --bg: #0a0a0a;
        --card-bg: #161616;
        --text-main: #ffffff;
        --text-dim: #a0a0a0;
    }

    body { 
        background-color: var(--bg); 
        color: var(--text-main); 
        font-family: 'Inter', -apple-system, sans-serif; 
        margin: 0;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; 
    }

    h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }

    /* Improved KPI Cards */
    .kpi-container { display: flex; gap: 20px; width: 100%; max-width: 840px; }
    .kpi-card { 
        flex: 1;
        background: linear-gradient(145deg, #1e1e1e, #161616);
        padding: 24px; 
        border-radius: 20px; 
        border: 1px solid #333;
        text-align: center;
        transition: transform 0.3s ease;
    }
    .kpi-card:hover { transform: translateY(-5px); border-color: var(--primary); }

    /* The Main Data Table */
    .main-card { 
        background: var(--card-bg); 
        padding: 25px; 
        border-radius: 24px; 
        width: 100%; 
        max-width: 800px; 
        margin-top: 20px;
        border: 1px solid #222;
    }

    .genre-item { 
        display: grid; 
        grid-template-columns: 50px 1fr 100px;
        align-items: center; 
        padding: 15px; 
        border-radius: 12px;
        margin-bottom: 8px;
        transition: all 0.2s; 
        cursor: pointer; 
    }
    .genre-item:hover { background: #222; padding-left: 20px; }

    .number-circle { 
        background: #333; 
        color: var(--text-dim); 
        width: 28px; height: 28px; 
        border-radius: 8px; 
        display: flex; justify-content: center; align-items: center; 
        font-size: 0.8em; 
    }

    /* Modern Modal */
    #details-modal { 
        display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); 
        width:400px; background:#1c1c1c; border-radius:24px; padding:30px; z-index:100;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    background: #1e1e1e;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid #333;
}

.search-wrapper {
    position: relative;
    flex: 2;
}

input#search-bar, select {
    width: 100%;
    padding: 12px 15px;
    background: #121212;
    border: 1px solid #444;
    border-radius: 10px;
    color: white;
    font-size: 0.95em;
    transition: all 0.3s ease;
}

input#search-bar:focus, select:focus {
    border-color: #fa243c;
    box-shadow: 0 0 8px rgba(250, 36, 60, 0.3);
    outline: none;
}

.select-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
}

.select-group label {
    font-size: 0.8em;
    color: #888;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.controls-row {
    display: flex;
    background: #1e1e1e;
    padding: 15px;
    border-radius: 12px;
    gap: 15px;
    align-items: center;
    border: 1px solid #333;
    margin-bottom: 20px;
}

#search-bar {
    flex: 3;
    padding: 10px;
    background: #000;
    border: 1px solid #444;
    color: white;
    border-radius: 8px;
}

.select-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.select-wrapper label {
    font-size: 0.7em;
    color: #fa243c;
    margin-bottom: 4px;
    font-weight: bold;
}

select {
    padding: 8px;
    background: #000;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #fa243c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease;   
}
 </style>
</head>
<body>

    <h1>iTunes Business Intelligence</h1>

    <div class="kpi-container">
        <div class="kpi-card">
            <h2 id="kpi-visible" style="color: #fa243c; margin: 0;">0</h2>
            <small style="color: #888;">Filtered</small>
        </div>
        <div class="kpi-card">
            <h2 id="kpi-db-total" style="color: #00d4ff; margin: 0;">0</h2>
            <small style="color: #888;">Total in DB</small>
        </div>
        <div class="kpi-card">
            <h2 style="color: #4cd964; margin: 0;">Live</h2>
            <small style="color: #888;">Sync Status</small>
        </div>
    </div>

    <div class="card">
        <div class="controls-row">
    <div class="search-wrapper">
        <input type="text" id="search-bar" placeholder="🔍 Search artist names...">
    </div>
    
    <div class="select-group">
        <label>Sort</label>
        <select id="sort-select">
            <option value="asc">A → Z</option>
            <option value="desc">Z → A</option>
        </select>
    </div>

    <div class="select-group">
        <label>Show</label>
        <select id="limit-select">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
        </select>
    </div>
</div>
        <div id="data-container">Initializing...</div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="details-modal">
        <h2 id="modal-artist-name" style="margin-top:0; color:#fa243c;"></h2>
        <p><strong>Total Tracks:</strong> <span id="modal-track-count" style="color:#00d4ff;"></span></p>
        <h4 style="margin-bottom:10px; border-bottom: 1px solid #333; padding-bottom:5px;">Albums</h4>
        <ul id="modal-album-list" style="padding-left:20px; max-height:120px; overflow-y:auto; color:#bbb;"></ul>
        <button class="close-btn" onclick="closeModal()">CLOSE</button>
    </div>
<script>
let allArtists = [];
let dbTotalCount = 0;

fetch('/api/stats')
    .then(res => res.json())
    .then(data => {
        allArtists = data.artists;
        dbTotalCount = data.db_total;
        
        // Set the static DB total once
        document.getElementById('kpi-db-total').innerText = dbTotalCount;
        applyQueries();
    });

function applyQueries() {
    const searchTerm = document.getElementById('search-bar').value.toLowerCase();
    const sortOrder = document.getElementById('sort-select').value;
    const limit = parseInt(document.getElementById('limit-select').value);
    
    // Filter and Sort logic
    let filtered = allArtists.filter(a => a.name.toLowerCase().includes(searchTerm));
    
    filtered.sort((a, b) => {
        return sortOrder === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
    });

    // Apply the "Show X" limit
    const toDisplay = filtered.slice(0, limit);
    renderList(toDisplay);

    // Update the "Visible" KPI
    document.getElementById('kpi-visible').innerText = `${toDisplay.length} / ${filtered.length}`;
}
function renderList(list) {
    const container = document.getElementById('data-container');
    if (list.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:#666;">No artists found matching that search.</div>`;
        return;
    }

    container.innerHTML = list.map((item, index) => `
        <div class="genre-item" onclick="showDetails(${item.artist_id})">
            <div class="number-circle">${index + 1}</div>
            <div style="font-weight:600;">${item.name}</div>
            <div style="color:var(--primary); font-size:0.8em; text-align:right;">View Details →</div>
        </div>
    `).join('');
}

function showDetails(id) {
    const artist = allArtists.find(a => a.artist_id === id);
    
    // UI Feedback: Set loading state
    const modal = document.getElementById('details-modal');
    document.getElementById('modal-artist-name').innerText = artist.name;
    document.getElementById('modal-album-list').innerHTML = "<li>Loading albums...</li>";
    
    modal.style.display = 'block';
    modal.style.opacity = '0';
    document.getElementById('overlay').style.display = 'block';

    // Fade in effect
    setTimeout(() => { modal.style.opacity = '1'; modal.style.transition = '0.3s'; }, 10);

    fetch(`/api/artist-details/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('modal-track-count').innerText = data.track_count;
            const albums = data.albums.length > 0 
                ? data.albums.map(a => `<li>${a}</li>`).join('')
                : "<li>No albums in database</li>";
            document.getElementById('modal-album-list').innerHTML = albums;
        });
}
function closeModal() {
    document.getElementById('details-modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

// Global Listeners
document.getElementById('search-bar').addEventListener('input', applyQueries);
document.getElementById('sort-select').addEventListener('change', applyQueries);

// Close on Escape key
document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") closeModal();
});
</script>
</body>
</html>
